<body class="bg-gray-50 min-h-[100vh]">

    <header class="flex items-center justify-between px-6 py-4 bg-white border-b border-gray-200">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center">
                <img src="assets/github-logo.png" alt="">
            </div>
            <span class="text-xl font-bold tracking-tight text-gray-900">GitHub Issues Tracker</span>
        </div>

        <div class="flex items-center gap-3">

            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                        stroke="currentColor">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" class="input-ghost" placeholder="Search" />

            </label>

            <button
                class="px-5  bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md shadow-sm transition-colors whitespace-nowrap py-3 cursor-pointer">
                <i class="fa fa-plus" aria-hidden="true"></i>

                New Issue
            </button>
        </div>
    </header>

    <section class="max-w-[1110px] m-auto mt-5">

        <!-- tab section -->
        <div class="flex items-center gap-2 p-4 bg-white rounded-lg w-full  shadow-sm">
            <button id="all"
                class=" filter-btn px-4 py-2 text-sm font-medium rounded-md transition-colors duration-200 bg-blue-600 text-white hover:bg-blue-600 cursor-pointer hover:text-white border-1 border-blue-600">
                All
            </button>
            <button id="Open"
                class=" filter-btn px-4 py-2 text-sm font-medium rounded-md transition-colors duration-200 bg-white text-gray-700 hover:bg-blue-600 cursor-pointer hover:text-white border-1 border-blue-600"
                border-1 border-blue-600>
                Open
            </button>
            <button id="close"
                class=" filter-btn px-4 py-2 text-sm font-medium rounded-md transition-colors duration-200 bg-white text-gray-700 hover:bg-blue-600 cursor-pointer hover:text-white border-1 border-blue-600">
                Close
            </button>
        </div>


        <!-- issue info section -->
        <div class="bg-white p-4 flex justify-between mt-4 shadow-sm rounded-md mb-4">
            <div class="flex items-center gap-2">
                <img class="bg-purple-100 p-3 rounded-full" src="assets/Aperture.png" alt="">
                <div>
                    <p class="font-bold text-lg">50 Issues</p>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-[10px] h-[10px] rounded-full bg-green-500"></div>
                <p>Open</p>
                <div class="w-[10px] h-[10px] rounded-full bg-purple-500"></div>
                <p>Closed</p>
            </div>
        </div>


        <!-- content section -->
        <div id="issue-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 bg-gray-100 rounded-md p-4">
