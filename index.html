<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
        href="https://cdn.jsdelivr.net/combine/npm/daisyui@5/base/scrollbar.css,npm/daisyui@5/base/rootscrolllock.css,npm/daisyui@5/base/rootcolor.css,npm/daisyui@5/base/reset.css,npm/daisyui@5/base/properties.css,npm/daisyui@5/base/rootscrollgutter.css,npm/daisyui@5/base/svg.css,npm/daisyui@5/components/button.css,npm/daisyui@5/components/toggle.css,npm/daisyui@5/components/input.css,npm/daisyui@5/components/checkbox.css,npm/daisyui@5/components/select.css,npm/daisyui@5/components/menu.css,npm/daisyui@5/theme/light.css"
        rel="stylesheet" type="text/css" />

</head>

<body>
    
    
<div id="login-container" class="h-[100vh] w-full bg-gray-50">
    <div class="w-[540px] m-auto bg-white p-4 mt-5 shadow-md rounded-md">
        <div class="flex flex-col justify-center items-center">
            <img src="/assets/github-logo.png" alt="">
            <p class="text-lg">Github Issue tracker</p>
            <p class="text-sm font-extralight">Sign in to manage your issues</p>
        </div>

        <p>UserName</p>
        <input type="text" id="username" placeholder="Enter Username"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200 my-2" />
        <p class="text-blue-400 text-sm font-bold">Default: admin</p>
        <p>Password</p>
        <input type="password" id="password" placeholder="Enter Password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200 my-2" />
        <p class="text-blue-400 text-sm font-bold">Default: admin123</p>
        <button id="signin-btn" class="bg-blue-500 text-white w-full py-2 rounded-md hover:bg-blue-700 cursor-pointer mt-4">Sign in</button>

        <div class="flex justify-evenly items-center gap-3 my-4">
            <div class="h-[2px] bg-gray-200 w-full rounded-md "></div>
            <p class="text-lg">OR</p>
            <div class="h-[2px] bg-gray-200 w-full rounded-md "></div>
        </div>
        <p class="text-center font-extralight">Demo Credentials</p>
        <div class="my-2 bg-gray-100 rounded py-4">
            <p class="text-center"><span class="font-bold">Username:</span> admin</p>
            <p class="text-center"><span class="font-bold">Password:</span> admin123</p>
        </div>
    </div>
</div>

<script src="index.js"></script>

</body>
</html>
